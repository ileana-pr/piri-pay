<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piri — Pick your flavor. Get your money.</title>
    <meta name="description" content="One scan, every way to pay. La piragua del pueblo." />
    <meta property="og:title" content="Piri" />
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <div id="root"></div>
    <!-- optional: ?debug=1 in URL shows on-device console (no USB) -->
    <script>
      (function () {
        if (new URLSearchParams(location.search).get('debug') !== '1') return;
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/vconsole@3.15.1/dist/vconsole.min.js';
        s.onload = function () {
          if (typeof window.VConsole !== 'undefined') new window.VConsole();
        };
        s.onerror = function () { console.warn('vConsole failed to load'); };
        document.head.appendChild(s);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
