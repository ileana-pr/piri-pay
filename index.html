<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo/piri.png" />
    <link rel="apple-touch-icon" href="/logo/piri.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piri — Pick your flavors. Get paid.</title>
    <meta name="description" content="One QR code, every way to pay! I Unify fiat and crypto in a single link." />
    <meta property="og:title" content="Piri Pay" />
    <meta property="og:image" content="https://piri-pay.vercel.app/og-image.png" />
    <meta property="og:image:alt" content="Piri Pay — Pick your flavors. Get paid." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://piri-pay.vercel.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <!-- readable-stream (via walletconnect → create-hash → ripemd160) needs process.browser and a string process.version before deps load -->
    <script>
      (function () {
        var p = globalThis.process;
        if (!p) {
          globalThis.process = { browser: true, version: '', env: {} };
          return;
        }
        p.browser = true;
        if (p.version == null || typeof p.version !== 'string') p.version = '';
        if (!p.env) p.env = {};
      })();
    </script>
    <!-- optional: ?debug=1 in URL shows on-device console (no USB) -->
    <script>
      (function () {
        if (new URLSearchParams(location.search).get('debug') !== '1') return;
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/vconsole@3.15.1/dist/vconsole.min.js';
        s.onload = function () {
          if (typeof window.VConsole !== 'undefined') new window.VConsole();
        };
        s.onerror = function () { console.warn('vConsole failed to load'); };
        document.head.appendChild(s);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
